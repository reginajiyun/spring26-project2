<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emotional Barometer Diary With K-POP</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Fredoka', 'sans-serif'],
            body: ['Nunito', 'sans-serif']
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background-image: linear-gradient(135deg, #fff9fa 0%, #fdf2f6 50%, #f4e8ed 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: #5c4e57;
      margin: 0;
    }
    h1, h2, h3, h4, h5, h6 { font-family: 'Fredoka', sans-serif; }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #f0e1e8; border-radius: 10px; }

    hr.barometer-1 { border: 0; height: 4px; background: linear-gradient(to right, #ffb7b2, #ffdac1); border-radius: 10px; margin: 2.5rem 0; opacity: 0.9; }
    hr.barometer-2 { border: 0; border-top: 4px dashed #b5ead7; margin: 2.5rem 0; opacity: 0.8; }
    hr.barometer-3 { border: 0; border-top: 6px dotted #cbaacb; margin: 2.5rem 0; opacity: 0.9; }
    hr.barometer-4 { border: 0; height: 8px; background: radial-gradient(circle, #e2f0cb 0%, transparent 100%); margin: 2.5rem 0; opacity: 0.9; }
    hr.barometer-5 { border: 0; border-top: 6px double #a7c7e7; margin: 2.5rem 0; opacity: 0.8; }
    hr.barometer-6 { border: 0; height: 5px; background: repeating-linear-gradient(45deg, #ff9aa2, #ff9aa2 12px, transparent 12px, transparent 24px); margin: 2.5rem 0; opacity: 0.8; }
    hr.barometer-7 { border: 0; height: 3px; background-color: #f6eac2; box-shadow: 0 0 10px 3px #f6eac2; margin: 2.5rem 0; opacity: 0.9; }
    hr.barometer-8 { border: 0; height: 10px; background: linear-gradient(90deg, #cbaacb, #ffb7b2); clip-path: polygon(0 40%, 100% 0, 100% 60%, 0 100%); margin: 2.5rem 0; opacity: 0.8; }
    hr.barometer-9 { border: 0; border-top: 4px solid #b5ead7; transform: skewY(-2deg); margin: 2.5rem 0; opacity: 0.9; }
    hr.barometer-10 { border: 0; height: 6px; background: linear-gradient(to right, transparent, #a7c7e7, transparent); border-radius: 50%; margin: 2.5rem 0; opacity: 0.9; }
    hr.barometer-11 { border: 0; border-top: 5px groove #ffdac1; margin: 2.5rem 0; opacity: 0.9; }
    hr.barometer-12 { border: 0; height: 5px; background: repeating-radial-gradient(circle, #ff9aa2 0, #ff9aa2 6px, transparent 6px, transparent 12px); margin: 2.5rem 0; opacity: 0.8; }
    hr.barometer-13 { border: 0; height: 8px; background-color: #e2f0cb; border-radius: 20px 0 20px 0; margin: 2.5rem 0; opacity: 0.9; }
    hr.barometer-14 { border: 0; height: 2px; background-color: #cbaacb; box-shadow: 0 6px 0 #ffb7b2, 0 12px 0 #b5ead7; margin: 2.5rem 0; margin-bottom: 3.5rem; opacity: 0.8; }
    hr.barometer-15 { border: 0; border-top: 6px ridge #a7c7e7; margin: 2.5rem 0; opacity: 0.9; }
    hr.barometer-16 { border: 0; height: 4px; background: linear-gradient(90deg, #ff9aa2 50%, transparent 50%); background-size: 24px 100%; margin: 2.5rem 0; opacity: 0.8; }
    hr.barometer-17 { border: 0; height: 8px; background: #f6eac2; clip-path: polygon(0 0, 100% 40%, 100% 60%, 0 100%); margin: 2.5rem 0; opacity: 0.9; }
    hr.barometer-18 { border: 0; height: 5px; background: linear-gradient(to right, #ffdac1, #cbaacb, #b5ead7); filter: blur(2px); margin: 2.5rem 0; opacity: 0.9; }
    hr.barometer-19 { border: 0; border-top: 4px dashed #ff9aa2; border-bottom: 4px dotted #a7c7e7; height: 12px; background: transparent; margin: 2.5rem 0; opacity: 0.8; }
    hr.barometer-20 { border: 0; height: 4px; background: conic-gradient(from 90deg, #e2f0cb, #ffb7b2, #e2f0cb); margin: 2.5rem 0; opacity: 0.9; }
    hr.barometer-21 { border: 0; height: 5px; background: #cbaacb; transform: rotate(1.5deg); margin: 2.5rem 0; opacity: 0.8; }
    hr.barometer-22 { border: 0; height: 8px; background: radial-gradient(ellipse at center, #ffdac1 0%, transparent 80%); margin: 2.5rem 0; opacity: 0.9; }
    hr.barometer-23 { border: 0; height: 6px; background: linear-gradient(45deg, transparent 45%, #b5ead7 45%, #b5ead7 55%, transparent 55%); background-size: 14px 14px; margin: 2.5rem 0; opacity: 0.8; }
    hr.barometer-24 { border: 0; height: 4px; background: linear-gradient(to right, #a7c7e7, transparent); border-radius: 0 50% 50% 0; margin: 2.5rem 0; opacity: 0.9; }
    hr.barometer-25 { border: 0; border-top: 5px solid #ff9aa2; border-image: linear-gradient(to right, #ff9aa2, #f6eac2) 1; margin: 2.5rem 0; opacity: 0.9; }

    .modal-overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content { transform: scale(0.95) translateY(20px); transition: all 0.3s ease; }
    .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }
    
    .diary-card { transition: all 0.3s ease; }
    .diary-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); background-color: rgba(255,255,255,0.6); }

    @keyframes viz-pulse {
      0%, 100% { transform: scaleY(1); opacity: 0.8; }
      25% { transform: scaleY(1.5); opacity: 1; filter: brightness(1.2); }
      50% { transform: scaleY(0.7); opacity: 0.6; }
      75% { transform: scaleY(1.3); opacity: 0.9; filter: brightness(1.1); }
    }

    @keyframes viz-wave {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes viz-dash {
      0%, 100% { opacity: 0.8; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-3px); }
    }

    @keyframes viz-glow {
      0%, 100% { box-shadow: 0 0 5px currentColor; opacity: 0.8; }
      50% { box-shadow: 0 0 20px currentColor, 0 0 10px currentColor; opacity: 1; transform: scaleY(1.2); }
    }

    .is-playing hr {
      animation: viz-pulse 0.7s infinite ease-in-out alternate;
      transform-origin: center;
    }

    .is-playing hr.barometer-1, 
    .is-playing hr.barometer-8, 
    .is-playing hr.barometer-10, 
    .is-playing hr.barometer-16,
    .is-playing hr.barometer-18,
    .is-playing hr.barometer-20,
    .is-playing hr.barometer-22,
    .is-playing hr.barometer-23,
    .is-playing hr.barometer-24 {
      background-size: 200% 200%;
      animation: viz-wave 1s infinite linear, viz-pulse 0.9s infinite ease-in-out;
    }

    .is-playing hr.barometer-2, 
    .is-playing hr.barometer-3, 
    .is-playing hr.barometer-5,
    .is-playing hr.barometer-9,
    .is-playing hr.barometer-11,
    .is-playing hr.barometer-15,
    .is-playing hr.barometer-19,
    .is-playing hr.barometer-21 {
      animation: viz-dash 0.4s infinite alternate;
    }

    .is-playing hr.barometer-7, 
    .is-playing hr.barometer-14,
    .is-playing hr.barometer-25 {
      animation: viz-glow 0.6s infinite alternate;
    }
  </style>
</head>
<body class="pb-32 relative overflow-hidden">

  <header class="pt-28 pb-12 px-6 max-w-2xl mx-auto relative z-10 text-center">
    <h1 class="text-4xl md:text-5xl font-sans font-semibold tracking-tight mb-5 text-[#5c4e57]">
      Emotional Barometer Diary
    </h1>
    <p class="text-[#9a8a94] font-body max-w-md mx-auto text-[15px] leading-relaxed">
      A K-pop listening diary where music shapes the fluctuations of everyday feelings. 
      Each line represents a shift in mood.
    </p>
  </header>

  <nav class="sticky top-0 z-40 bg-[#fff9fa]/70 backdrop-blur-xl border-b border-[#f0e1e8]/50 py-4 mb-16 shadow-[0_4px_20px_rgba(255,249,250,0.5)] overflow-x-auto no-scrollbar">
    <div id="nav-filters" class="max-w-5xl mx-auto px-6 flex flex-nowrap justify-start md:justify-center gap-2 w-max min-w-full">
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 relative z-10">
    <div id="diary-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8">
    </div>
    <div id="empty-state" class="hidden text-center text-[#9a8a94] py-20 font-body text-sm w-full">
      No entries found for this mood.
    </div>
  </main>

  <button id="btn-add" class="fixed bottom-8 right-8 z-40 bg-[#ffb7b2] text-white p-4 rounded-full shadow-lg shadow-[#ffb7b2]/40 hover:bg-[#ffa5a0] hover:shadow-xl hover:shadow-[#ffb7b2]/50 transition-all flex items-center justify-center group cursor-pointer">
    <i data-lucide="plus" class="w-7 h-7"></i>
    <span class="w-0 overflow-hidden whitespace-nowrap group-hover:w-24 transition-all duration-300 font-sans font-medium text-sm ml-0 group-hover:ml-2">
      Add Diary
    </span>
  </button>

  <div id="modal-container" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6">
    <div class="absolute inset-0 bg-[#5c4e57]/40 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="modal-content bg-[#fff9fa] w-full max-w-3xl rounded-3xl shadow-2xl relative z-10 flex flex-col max-h-[90vh]">
      <div id="modal-body" class="flex flex-col h-full overflow-hidden">
      </div>
    </div>
  </div>

  <script>
    const initialEntries = [
      { id: "1", date: "Oct 12", song: "Ditto", artist: "NewJeans", mood: "nostalgic", note: "Winter air feels sharp today. Missing the old days, walking home from school with shared earphones.", fullNote: "The weather suddenly turned cold today, and the sharp winter air immediately brought back memories of high school. I remembered how we used to share wired earphones, walking back home while listening to old songs.", youtubeUrl: "https://www.youtube.com/watch?v=pSUydWEqKwE" },
      { id: "2", date: "Oct 14", song: "God's Menu", artist: "Stray Kids", mood: "anxious", note: "Too much caffeine. My heart is racing and I have three deadlines by midnight.", fullNote: "I definitely drank too much coffee today. My hands are shaking slightly, and looking at the clock doesn't help.", youtubeUrl: "https://www.youtube.com/watch?v=TQTlCHxyuu8" },
      { id: "3", date: "Oct 15", song: "Supernova", artist: "aespa", mood: "energized", note: "Just crushed my presentation. Feeling completely unstoppable right now.", fullNote: "Weeks of preparation finally paid off! The presentation went flawlessly, and the Q&A session was a breeze.", youtubeUrl: "https://www.youtube.com/watch?v=phuiiNCxRMg" },
      { id: "4", date: "Oct 18", song: "Love Poem", artist: "IU", mood: "melancholic", note: "Rain is falling against the window. Everything feels a bit heavy.", fullNote: "It's been raining all afternoon. I haven't turned on the lights yet, just sitting by the window watching the drops trace paths on the glass. Some days, the weight of everything just sits on your shoulders, and you don't really want to shake it off.", youtubeUrl: "https://youtu.be/OcVmaIlHZ1o?si=3To2-hOnU4ISSDaw" },
      { id: "5", date: "Oct 21", song: "Feel Special", artist: "TWICE", mood: "euphoric", note: "Hung out with my best friends today. The world shines a little brighter with them.", fullNote: "We hadn't seen each other in months, but the moment we met, it felt like no time had passed.", youtubeUrl: "https://www.youtube.com/watch?v=3ymwOvzhwHs" },
      { id: "6", date: "Oct 22", song: "INVU", artist: "TAEYEON", note: "Staring at the ceiling fan making shapes in the dark.", mood: "dreamy", youtubeUrl: "https://www.youtube.com/watch?v=AbZH7XWDW_k" },
      { id: "7", date: "Oct 25", song: "Eve, Psyche & The Bluebeard's Wife", artist: "LE SSERAFIM", note: "Deep work mode. In the zone. Do not disturb.", mood: "focused", youtubeUrl: "https://youtu.be/dZs_cLHfnNA?si=79byp0glZQHIEZXZ" },
      { id: "8", date: "Oct 27", song: "TOMBOY", artist: "(G)I-DLE", note: "Sick of following the rules. I'm going to do things my way from now on.", mood: "rebellious", youtubeUrl: "https://www.youtube.com/watch?v=Jh4QFaPmdss" },
      { id: "9", date: "Oct 30", song: "Through the Night", artist: "IU", note: "I said things I didn't mean. Wish I could take it back.", mood: "heartbroken", youtubeUrl: "https://youtu.be/BzYnNdJhZQw?si=AUfF7Xx89Cl6UpdS" },
      { id: "10", date: "Nov 2", song: "Attention", artist: "NewJeans", note: "Sunday morning. Coffee, sunlight, and nowhere to be.", mood: "chill", youtubeUrl: "https://youtu.be/js1CtxSY38I?si=2ouRhaYmuWTtfjt5" },
      { id: "11", date: "Nov 5", song: "Spring Day", artist: "BTS", note: "Found an old photocard in a book. It made me smile and ache at the same time.", mood: "nostalgic", youtubeUrl: "https://www.youtube.com/watch?v=xEeFrLSkMm8" },
      { id: "12", date: "Nov 8", song: "Miroh", artist: "Stray Kids", note: "Lost in the city, literal and metaphorical. Where am I going?", mood: "anxious", youtubeUrl: "https://www.youtube.com/watch?v=Dab4EENTW5I" },
      { id: "13", date: "Nov 11", song: "Antifragile", artist: "LE SSERAFIM", note: "Gym PR today! The bass drop hit exactly when I needed it.", mood: "energized", youtubeUrl: "https://www.youtube.com/watch?v=pyf8cbqyfPs" },
      { id: "14", date: "Nov 14", song: "Universe", artist: "EXO", note: "The sky has been overcast for three days straight.", mood: "melancholic", youtubeUrl: "https://youtu.be/leu-cTvMWTA?si=U5XGeqrvg4-8AFeW" },
      { id: "15", date: "Nov 17", song: "Hype Boy", artist: "NewJeans", note: "Finally got the tickets! I can't stop smiling.", mood: "euphoric", youtubeUrl: "https://www.youtube.com/watch?v=11cta61wi0g" },
      { id: "16", date: "Nov 20", song: "Butterfly", artist: "LOONA", note: "Floating through the day, not fully tethered to reality.", mood: "dreamy", youtubeUrl: "https://www.youtube.com/watch?v=XEOCbFJjRw0" },
      { id: "17", date: "Nov 23", song: "Next Level", artist: "aespa", note: "Coding for 6 hours straight. Just me and the terminal.", mood: "focused", youtubeUrl: "https://www.youtube.com/watch?v=4TWR90KJl84" },
      { id: "18", date: "Nov 26", song: "Black Mamba", artist: "aespa", note: "Quit my toxic part-time job. Feeling terrified but liberated.", mood: "rebellious", youtubeUrl: "https://www.youtube.com/watch?v=ZeerrnuLiSQ" },
      { id: "19", date: "Nov 29", song: "Lonely", artist: "2NE1", note: "Even in a crowded room, I feel entirely alone today.", mood: "heartbroken", youtubeUrl: "https://www.youtube.com/watch?v=5n4V3lGEyG4" },
      { id: "20", date: "Dec 2", song: "Any Song", artist: "ZICO", note: "Late night drive with no destination in mind.", mood: "chill", youtubeUrl: "https://www.youtube.com/watch?v=UuV2BmJ1p_I" },
      { id: "21", date: "Dec 5", song: "Into the New World", artist: "Girls' Generation", note: "Looking at my old high school yearbooks. We were so young.", mood: "nostalgic", youtubeUrl: "https://www.youtube.com/watch?v=0k2Zzkw_-0I" },
      { id: "22", date: "Dec 8", song: "Thunderous", artist: "Stray Kids", note: "Waiting for the exam results to be posted. Cannot breathe.", mood: "anxious", youtubeUrl: "https://www.youtube.com/watch?v=EaswWiwMVs8" },
      { id: "23", date: "Dec 11", song: "DDU-DU DDU-DU", artist: "BLACKPINK", note: "Walking into the interview room feeling like a CEO.", mood: "energized", youtubeUrl: "https://www.youtube.com/watch?v=IHNzOHi8sJs" },
      { id: "24", date: "Dec 14", song: "Stay", artist: "BLACKPINK", note: "Everything is changing too fast. I just want things to pause.", mood: "melancholic", youtubeUrl: "https://www.youtube.com/watch?v=FzVR_fymZw4" },
      { id: "25", date: "Dec 17", song: "Love Dive", artist: "IVE", note: "Just perfect. Everything clicked into place today.", mood: "euphoric", youtubeUrl: "https://www.youtube.com/watch?v=Y8JFxS1HlDo" }
    ];

    const moodColors = {
      nostalgic: { text: "text-[#8fa3c2]", bg: "bg-[#e5f0fa]", border: "border-[#a7c7e7]" },
      anxious: { text: "text-[#d17a82]", bg: "bg-[#ffe5e7]", border: "border-[#ff9aa2]" },
      energized: { text: "text-[#88b588]", bg: "bg-[#eef8ee]", border: "border-[#c1e1c1]" },
      melancholic: { text: "text-[#a682a6]", bg: "bg-[#f4e6f4]", border: "border-[#cbaacb]" },
      euphoric: { text: "text-[#d68b85]", bg: "bg-[#fff0ed]", border: "border-[#ffb7b2]" },
      dreamy: { text: "text-[#8cb8a6]", bg: "bg-[#e8faed]", border: "border-[#b5ead7]" },
      focused: { text: "text-[#7a6f76]", bg: "bg-[#f2ecef]", border: "border-[#c2b6be]" },
      rebellious: { text: "text-[#ccab97]", bg: "bg-[#fff5ee]", border: "border-[#ffdac1]" },
      heartbroken: { text: "text-[#7693b0]", bg: "bg-[#e6eff7]", border: "border-[#a7c7e7]" },
      chill: { text: "text-[#95b595]", bg: "bg-[#ebf5eb]", border: "border-[#c1e1c1]" }
    };

    const allMoods = Object.keys(moodColors);

    let entries = [...initialEntries];
    let activeMood = null;
    let editingId = null;

    const getYoutubeVideoId = (url) => {
      if (!url) return null;
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    };

    const getCustomBarStyleString = (cb) => {
      let style = "border: 0; margin: 2.5rem 0; opacity: 0.9; width: 100%; transition: all 0.7s;";
      if (!cb) return style;
      if (cb.type === 'solid') style += `border-top: ${cb.height}px solid ${cb.color1};`;
      if (cb.type === 'dashed') style += `border-top: ${cb.height}px dashed ${cb.color1};`;
      if (cb.type === 'dotted') style += `border-top: ${cb.height}px dotted ${cb.color1};`;
      if (cb.type === 'double') style += `border-top: ${cb.height * 2}px double ${cb.color1};`;
      if (cb.type === 'gradient') style += `height: ${cb.height}px; background: linear-gradient(to right, ${cb.color1}, ${cb.color2}); border-radius: ${cb.height}px;`;
      if (cb.type === 'striped') style += `height: ${cb.height}px; background: repeating-linear-gradient(45deg, ${cb.color1}, ${cb.color1} 10px, transparent 10px, transparent 20px);`;
      return style;
    };

    const renderNav = () => {
      const nav = document.getElementById('nav-filters');
      let html = `<button onclick="setMood(null)" class="px-4 py-1.5 rounded-full text-[13px] transition-all duration-300 font-sans font-medium tracking-wide border shrink-0 cursor-pointer ${activeMood === null ? 'bg-[#5c4e57] text-white border-[#5c4e57] shadow-sm' : 'bg-white/50 text-[#9a8a94] border-[#f0e1e8] hover:border-[#c2b6be] hover:bg-white'}">All</button>`;
      
      allMoods.forEach(mood => {
        const c = moodColors[mood];
        const isActive = activeMood === mood;
        html += `<button onclick="setMood('${mood}')" class="px-4 py-1.5 rounded-full text-[13px] transition-all duration-300 capitalize font-sans font-medium tracking-wide border shrink-0 cursor-pointer ${isActive ? `${c.bg} ${c.text} ${c.border} shadow-sm` : 'bg-white/50 text-[#9a8a94] border-[#f0e1e8] hover:border-[#c2b6be] hover:bg-white'}">${mood}</button>`;
      });
      nav.innerHTML = html;
    };

    const renderGrid = () => {
      const grid = document.getElementById('diary-grid');
      const emptyState = document.getElementById('empty-state');
      
      const filtered = activeMood ? entries.filter(e => e.mood === activeMood) : entries;
      
      if (filtered.length === 0) {
        grid.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }
      
      emptyState.classList.add('hidden');
      
      let html = '';
      filtered.forEach(entry => {
        const c = moodColors[entry.mood];
        const hrHtml = entry.customBarometer 
          ? `<hr style="${getCustomBarStyleString(entry.customBarometer)}" />` 
          : `<hr class="barometer-${entry.id} w-full transition-all duration-700" />`;

        html += `
          <div onclick="openDetailModal('${entry.id}')" class="diary-card flex flex-col gap-2 bg-white/40 p-6 sm:p-8 rounded-3xl border border-[#f0e1e8]/50 shadow-sm backdrop-blur-sm h-full cursor-pointer">
            <div class="flex justify-between items-center mb-2">
              <span class="text-[13px] text-[#9a8a94] font-semibold font-sans">${entry.date}</span>
              <span class="text-[11px] uppercase tracking-wider px-2.5 py-1 rounded-full border font-bold font-sans ${c.bg} ${c.text} ${c.border}">${entry.mood}</span>
            </div>
            <div class="flex-grow">
              <h2 class="text-2xl font-sans font-medium text-[#5c4e57]">${entry.song}</h2>
              <h3 class="text-[15px] font-sans text-[#9a8a94] mb-4">${entry.artist}</h3>
              <p class="font-body text-[15px] leading-relaxed text-[#7d6b76] line-clamp-3">${entry.note}</p>
            </div>
            <div class="mt-6">${hrHtml}</div>
          </div>
        `;
      });
      grid.innerHTML = html;
    };

    const setMood = (mood) => {
      activeMood = mood;
      renderNav();
      renderGrid();
    };

    const closeModal = () => {
      document.getElementById('modal-container').classList.remove('active');
      document.body.style.overflow = 'auto';
    };

    const openDetailModal = (id) => {
      const entry = entries.find(e => e.id === id);
      if (!entry) return;
      
      const c = moodColors[entry.mood];
      const videoId = getYoutubeVideoId(entry.youtubeUrl);
      
      let youtubeHtml = '';
      if (entry.youtubeUrl) {
        youtubeHtml = `
          <div>
            <h4 class="font-sans font-medium text-[#7d6b76] flex items-center gap-2 mb-3 text-sm uppercase tracking-wider">
              <i data-lucide="youtube" class="w-4 h-4 text-red-400"></i> Watch on YouTube
            </h4>
            <a href="${entry.youtubeUrl}" target="_blank" class="block rounded-2xl overflow-hidden border border-[#f0e1e8] hover:border-[#ffb7b2] transition-colors group relative bg-black/5">
              ${videoId 
                ? `<div class="aspect-video relative">
                     <img src="https://img.youtube.com/vi/${videoId}/hqdefault.jpg" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                     <div class="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors flex items-center justify-center">
                       <div class="w-14 h-14 rounded-full bg-red-600/90 text-white flex items-center justify-center shadow-lg transform group-hover:scale-110 transition-all">
                         <i data-lucide="youtube" class="w-7 h-7"></i>
                       </div>
                     </div>
                   </div>`
                : `<div class="flex items-center justify-between font-body text-[15px] font-medium text-[#5c4e57] hover:text-[#ffb7b2] bg-white p-5">
                     <div class="flex items-center gap-3">
                       <div class="w-10 h-10 rounded-full bg-red-50 flex items-center justify-center text-red-500 group-hover:bg-red-500 group-hover:text-white transition-colors">
                         <i data-lucide="youtube" class="w-5 h-5"></i>
                       </div>
                       Play on YouTube
                     </div>
                     <i data-lucide="external-link" class="w-4 h-4 text-[#9a8a94] group-hover:text-[#ffb7b2]"></i>
                   </div>`
              }
            </a>
          </div>
        `;
      }

      const hrHtml = entry.customBarometer 
        ? `<hr style="${getCustomBarStyleString(entry.customBarometer)}" />` 
        : `<hr class="barometer-${entry.id} w-full transition-all duration-700" />`;

      const html = `
        <div class="flex justify-between items-start p-6 pb-2">
          <div>
            <span class="inline-block text-[11px] uppercase tracking-wider px-2.5 py-1 rounded-full border font-bold font-sans mb-3 ${c.bg} ${c.text} ${c.border}">
              ${entry.mood}
            </span>
            <div class="flex items-center gap-3">
              <h2 class="text-3xl font-sans font-semibold text-[#5c4e57]">${entry.song}</h2>
              <button onclick="openFormModal('${entry.id}')" class="p-1.5 rounded-full hover:bg-[#f4e8ed] text-[#ffb7b2] transition-colors cursor-pointer">
                <i data-lucide="edit-2" class="w-4 h-4"></i>
              </button>
            </div>
            <h3 class="text-lg font-sans text-[#9a8a94] flex items-center gap-2 mt-1">
              ${entry.artist} <span class="text-[#f0e1e8]">|</span> ${entry.date}
            </h3>
          </div>
          <button onclick="closeModal()" class="p-2 rounded-full hover:bg-[#f4e8ed] text-[#9a8a94] transition-colors cursor-pointer">
            <i data-lucide="x" class="w-6 h-6"></i>
          </button>
        </div>
        <!-- 'is-playing' 클래스를 추가해서 애니메이션 적용 -->
        <div class="px-6 py-4 is-playing">${hrHtml}</div>
        <div class="overflow-y-auto p-6 pt-0 custom-scrollbar flex-grow space-y-8">
          <div>
            <h4 class="font-sans font-medium text-[#7d6b76] flex items-center gap-2 mb-3 text-sm uppercase tracking-wider">
              <i data-lucide="align-left" class="w-4 h-4 text-[#ffb7b2]"></i> Diary Entry
            </h4>
            <p class="font-body text-[16px] leading-relaxed text-[#5c4e57] bg-white p-5 rounded-2xl border border-[#f0e1e8]">
              ${entry.fullNote || entry.note}
            </p>
          </div>
          <div class="grid grid-cols-1 gap-6">${youtubeHtml}</div>
        </div>
      `;

      document.getElementById('modal-body').innerHTML = html;
      document.getElementById('modal-container').classList.add('active');
      document.body.style.overflow = 'hidden';
      lucide.createIcons();
    };

    const openFormModal = (id = null) => {
      editingId = id;
      const entry = id ? entries.find(e => e.id === id) : {};
      
      const formHtml = `
        <div class="flex justify-between items-center p-6 border-b border-[#f0e1e8]">
          <h2 class="text-2xl font-sans font-semibold text-[#5c4e57]">${id ? 'Edit Diary Entry' : 'Create New Diary Entry'}</h2>
          <button onclick="closeModal()" class="p-2 rounded-full hover:bg-[#f4e8ed] text-[#9a8a94] transition-colors cursor-pointer">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
        <div class="overflow-y-auto p-6 custom-scrollbar flex-grow">
          <form id="diary-form" onsubmit="handleFormSubmit(event)" class="space-y-8">
            <div class="space-y-4">
              <h3 class="font-sans font-medium text-[#7d6b76] flex items-center gap-2"><i data-lucide="music" class="w-4 h-4 text-[#ffb7b2]"></i> Music Info</h3>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-bold text-[#9a8a94] uppercase tracking-wider mb-1.5 font-sans">Song Title *</label>
                  <input type="text" id="f-song" required value="${entry.song || ''}" class="w-full bg-white border border-[#f0e1e8] rounded-xl px-4 py-2.5 outline-none focus:border-[#ffb7b2] font-body text-[#5c4e57]" placeholder="e.g. Ditto" />
                </div>
                <div>
                  <label class="block text-xs font-bold text-[#9a8a94] uppercase tracking-wider mb-1.5 font-sans">Artist *</label>
                  <input type="text" id="f-artist" required value="${entry.artist || ''}" class="w-full bg-white border border-[#f0e1e8] rounded-xl px-4 py-2.5 outline-none focus:border-[#ffb7b2] font-body text-[#5c4e57]" placeholder="e.g. NewJeans" />
                </div>
                <div class="col-span-1 sm:col-span-2">
                  <label class="block text-xs font-bold text-[#9a8a94] uppercase tracking-wider mb-1.5 font-sans">YouTube Link (Optional)</label>
                  <input type="url" id="f-youtube" value="${entry.youtubeUrl || ''}" class="w-full bg-white border border-[#f0e1e8] rounded-xl px-4 py-2.5 outline-none focus:border-[#ffb7b2] font-body text-[#5c4e57]" placeholder="https://youtube.com/..." />
                </div>
              </div>
            </div>
            
            <div class="space-y-4">
              <h3 class="font-sans font-medium text-[#7d6b76] flex items-center gap-2"><i data-lucide="type" class="w-4 h-4 text-[#b5ead7]"></i> Diary</h3>
              <div class="grid grid-cols-1 sm:grid-cols-[1fr_2fr] gap-4">
                <div>
                  <label class="block text-xs font-bold text-[#9a8a94] uppercase tracking-wider mb-1.5 font-sans">Date</label>
                  <input type="text" id="f-date" value="${entry.date || ''}" class="w-full bg-white border border-[#f0e1e8] rounded-xl px-4 py-2.5 outline-none focus:border-[#b5ead7] font-body text-[#5c4e57]" placeholder="e.g. Mar 10" />
                </div>
                <div>
                  <label class="block text-xs font-bold text-[#9a8a94] uppercase tracking-wider mb-1.5 font-sans">Mood Tag</label>
                  <select id="f-mood" class="w-full bg-white border border-[#f0e1e8] rounded-xl px-4 py-2.5 outline-none focus:border-[#b5ead7] font-body text-[#5c4e57] capitalize">
                    ${allMoods.map(m => `<option value="${m}" ${entry.mood === m ? 'selected' : ''}>${m}</option>`).join('')}
                  </select>
                </div>
              </div>
              <div>
                <label class="block text-xs font-bold text-[#9a8a94] uppercase tracking-wider mb-1.5 font-sans">Short Note *</label>
                <input type="text" id="f-note" required value="${entry.note || ''}" class="w-full bg-white border border-[#f0e1e8] rounded-xl px-4 py-2.5 outline-none focus:border-[#b5ead7] font-body text-[#5c4e57]" />
              </div>
              <div>
                <label class="block text-xs font-bold text-[#9a8a94] uppercase tracking-wider mb-1.5 font-sans">Detailed Diary</label>
                <textarea id="f-fullNote" rows="5" class="w-full bg-white border border-[#f0e1e8] rounded-xl px-4 py-2.5 outline-none focus:border-[#b5ead7] font-body text-[#5c4e57] resize-none">${entry.fullNote || ''}</textarea>
              </div>
            </div>

            <!-- Barometer Design -->
            <div class="space-y-4 bg-[#fdf2f6] p-5 rounded-2xl border border-[#f4e8ed]">
              <h3 class="font-sans font-medium text-[#7d6b76] flex items-center gap-2 mb-4"><i data-lucide="palette" class="w-4 h-4 text-[#cbaacb]"></i> Design Your Barometer</h3>
              <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                <div class="col-span-2 sm:col-span-1">
                  <label class="block text-[11px] font-bold text-[#9a8a94] uppercase tracking-wider mb-1.5 font-sans">Style</label>
                  <select id="f-bType" onchange="updatePreview()" class="w-full bg-white border border-[#f0e1e8] rounded-lg px-3 py-2 text-sm outline-none font-body text-[#5c4e57]">
                    <option value="solid" ${entry.customBarometer?.type === 'solid' ? 'selected' : ''}>Solid Line</option>
                    <option value="dashed" ${entry.customBarometer?.type === 'dashed' ? 'selected' : ''}>Dashed Line</option>
                    <option value="dotted" ${entry.customBarometer?.type === 'dotted' ? 'selected' : ''}>Dotted Line</option>
                    <option value="double" ${entry.customBarometer?.type === 'double' ? 'selected' : ''}>Double Line</option>
                    <option value="gradient" ${!entry.customBarometer || entry.customBarometer?.type === 'gradient' ? 'selected' : ''}>Gradient Fill</option>
                    <option value="striped" ${entry.customBarometer?.type === 'striped' ? 'selected' : ''}>Striped Pattern</option>
                  </select>
                </div>
                <div class="col-span-2 sm:col-span-1">
                  <label class="block text-[11px] font-bold text-[#9a8a94] uppercase tracking-wider mb-1.5 font-sans">Thickness</label>
                  <input type="range" id="f-bHeight" oninput="updatePreview()" min="1" max="15" value="${entry.customBarometer?.height || 6}" class="w-full mt-2 accent-[#cbaacb]" />
                </div>
                <div class="col-span-1">
                  <label class="block text-[11px] font-bold text-[#9a8a94] uppercase tracking-wider mb-1.5 font-sans">Color 1</label>
                  <input type="color" id="f-bColor1" oninput="updatePreview()" value="${entry.customBarometer?.color1 || '#ffb7b2'}" class="w-8 h-8 rounded cursor-pointer border-0 p-0" />
                </div>
                <div class="col-span-1">
                  <label class="block text-[11px] font-bold text-[#9a8a94] uppercase tracking-wider mb-1.5 font-sans">Color 2</label>
                  <input type="color" id="f-bColor2" oninput="updatePreview()" value="${entry.customBarometer?.color2 || '#b5ead7'}" class="w-8 h-8 rounded cursor-pointer border-0 p-0" />
                </div>
              </div>
              <div class="mt-6 pt-4 border-t border-[#f0e1e8]">
                <span class="block text-[11px] font-bold text-[#9a8a94] uppercase tracking-wider mb-3 font-sans">Live Preview</span>
                <div class="bg-white p-6 rounded-xl border border-[#f0e1e8] shadow-sm flex items-center justify-center min-h-[60px] is-playing">
                  <hr id="preview-hr" />
                </div>
              </div>
            </div>
          </form>
        </div>
        <div class="p-6 border-t border-[#f0e1e8] bg-white flex justify-end gap-3 rounded-b-3xl">
          <button type="button" onclick="closeModal()" class="px-6 py-2.5 rounded-xl font-sans font-medium text-[#7d6b76] hover:bg-[#f4e8ed] transition-colors cursor-pointer">Cancel</button>
          <button form="diary-form" type="submit" class="px-6 py-2.5 rounded-xl font-sans font-medium text-white bg-[#ffb7b2] hover:bg-[#ffa5a0] shadow-md shadow-[#ffb7b2]/30 transition-all flex items-center gap-2 cursor-pointer">
            <i data-lucide="${id ? 'check' : 'plus'}" class="w-4 h-4"></i> ${id ? 'Save Changes' : 'Save Entry'}
          </button>
        </div>
      `;

      document.getElementById('modal-body').innerHTML = formHtml;
      document.getElementById('modal-container').classList.add('active');
      document.body.style.overflow = 'hidden';
      lucide.createIcons();
      updatePreview();
    };

    window.updatePreview = () => {
      const type = document.getElementById('f-bType').value;
      const height = parseInt(document.getElementById('f-bHeight').value);
      const color1 = document.getElementById('f-bColor1').value;
      const color2 = document.getElementById('f-bColor2').value;
      
      const hr = document.getElementById('preview-hr');
      hr.style.cssText = getCustomBarStyleString({ type, height, color1, color2 });
    };

    window.handleFormSubmit = (e) => {
      e.preventDefault();
      
      const newEntry = {
        id: editingId || `custom-${Date.now()}`,
        date: document.getElementById('f-date').value || new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
        song: document.getElementById('f-song').value,
        artist: document.getElementById('f-artist').value,
        note: document.getElementById('f-note').value,
        fullNote: document.getElementById('f-fullNote').value,
        youtubeUrl: document.getElementById('f-youtube').value,
        mood: document.getElementById('f-mood').value,
        customBarometer: {
          type: document.getElementById('f-bType').value,
          height: parseInt(document.getElementById('f-bHeight').value),
          color1: document.getElementById('f-bColor1').value,
          color2: document.getElementById('f-bColor2').value
        }
      };

      if (editingId) {
        entries = entries.map(entry => entry.id === editingId ? newEntry : entry);
      } else {
        entries.unshift(newEntry);
      }

      closeModal();
      renderGrid();
    };

    document.getElementById('btn-add').addEventListener('click', () => openFormModal(null));

    renderNav();
    renderGrid();
    lucide.createIcons();
  </script>
</body>
</html>
